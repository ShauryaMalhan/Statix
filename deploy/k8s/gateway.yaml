---
apiVersion: v1
kind: Namespace
metadata:
  name: finops-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-gateway
  namespace: finops-system
  labels:
    app: finops-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finops-gateway
  template:
    metadata:
      labels:
        app: finops-gateway
    spec:
      containers:
        - name: finops-gateway
          image: finops-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: FINOPS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finops-secrets
                  key: api-token
            - name: KAFKA_BROKERS
              value: kafka-broker.default.svc.cluster.local:9092
            - name: FINOPS_API_PORT
              value: "3000"
            - name: RUST_LOG
              value: info
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: finops-gateway-svc
  namespace: finops-system
  labels:
    app: finops-gateway
spec:
  type: ClusterIP
  selector:
    app: finops-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
