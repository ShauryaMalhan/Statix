---
apiVersion: v1
kind: Namespace
metadata:
  name: statix-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statix-gateway
  namespace: statix-system
  labels:
    app: statix-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: statix-gateway
  template:
    metadata:
      labels:
        app: statix-gateway
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: statix-gateway
      containers:
        - name: statix-gateway
          image: statix-gateway@sha256:a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456
          imagePullPolicy: Always
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "5"]
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: STATIX_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: statix-secrets
                  key: api-token
            - name: STATIX_INGEST_CHANNEL_SIZE
              value: "8192"
            - name: STATIX_CH_BATCH_MAX
              value: "1024"
            - name: STATIX_CH_LINGER_MS
              value: "50"
            - name: STATIX_CH_INSERT_TIMEOUT_SECS
              value: "3"
            - name: CLICKHOUSE_URL
              value: http://clickhouse.statix-system.svc.cluster.local:8123
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statix-secrets
                  key: clickhouse-password
            - name: STATIX_API_PORT
              value: "3000"
            - name: RUST_LOG
              value: info
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: statix-gateway-svc
  namespace: statix-system
  labels:
    app: statix-gateway
spec:
  type: ClusterIP
  selector:
    app: statix-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: statix-gateway-pdb
  namespace: statix-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: statix-gateway
