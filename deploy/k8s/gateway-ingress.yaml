---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: statix-gateway-ingress
  namespace: statix-system
  labels:
    app: statix-gateway
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
spec:
  ingressClassName: alb
  rules:
    - host: ingest.your-startup.com
      http:
        paths:
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: statix-gateway-svc
                port:
                  number: 3000
