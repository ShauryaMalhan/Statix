# Phase 3 ingest stack: Kafka (KRaft) → ClickHouse Kafka engine → MergeTree
# Network: finops-net

services:
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    networks:
      - finops-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    networks:
      - finops-net
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finops
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    networks:
      - finops-net
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: finops_dev
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    depends_on:
      - kafka

  finops-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    networks:
      - finops-net
    ports:
      - "3000:3000"
    environment:
      KAFKA_BROKERS: kafka:29092
      FINOPS_API_PORT: "3000"
      FINOPS_KAFKA_CHANNEL_SIZE: "8192"
      FINOPS_KAFKA_BATCH_MAX: "1024"
      FINOPS_KAFKA_LINGER_MS: "50"
      # FINOPS_API_TOKEN: "dev-secret"   # uncomment for auth; set same value on agent
      RUST_LOG: info
    depends_on:
      kafka:
        condition: service_healthy

networks:
  finops-net:
    driver: bridge

volumes:
  kafka-data:
  clickhouse-data:
