# Phase 13 ingest stack: agent → gateway → ClickHouse (queue-less)
# Network: statix-net

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    networks:
      - statix-net
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse/01_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:latest
    container_name: statix-grafana
    networks:
      - statix-net
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    depends_on:
      clickhouse:
        condition: service_healthy

  statix-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    networks:
      - statix-net
    ports:
      - "3000:3000"
    environment:
      STATIX_API_PORT: "3000"
      STATIX_INGEST_CHANNEL_SIZE: "8192"
      STATIX_CH_BATCH_MAX: "1024"
      STATIX_CH_LINGER_MS: "50"
      STATIX_CH_INSERT_TIMEOUT_SECS: "3"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # STATIX_API_TOKEN: ${STATIX_API_TOKEN}   # set in .env when testing auth
      RUST_LOG: info
    depends_on:
      clickhouse:
        condition: service_healthy

networks:
  statix-net:
    driver: bridge

volumes:
  clickhouse-data:
